apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: ajexjoshy/order-service:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: ORDER_SERVICE_PORT
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: ORDER_USER_SERVICE_GRPC_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: grpc-project-secrets
              key: DATABASE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP

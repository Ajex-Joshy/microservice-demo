apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ajexjoshy/api-gateway:latest  
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: GATEWAY_PORT
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: USER_SERVICE_URL
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: ORDER_SERVICE_URL
        - name: AUTH_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: grpc-project-secrets
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 3000
  # Note: Use 'type: LoadBalancer' in cloud environments (AWS, GCP, Azure)
  # or use an Ingress Controller for production.
  type: LoadBalancer

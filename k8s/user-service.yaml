apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: ajexjoshy/user-service:latest  
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
          name: http
        - containerPort: 5052
          name: grpc
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: USER_SERVICE_PORT
        - name: GRPC_PORT
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: USER_SERVICE_GRPC_PORT
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: grpc-project-secrets
              key: JWT_SECRET
        - name: JWT_EXPIRY
          valueFrom:
            configMapKeyRef:
              name: grpc-project-config
              key: JWT_EXPIRY
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: grpc-project-secrets
              key: MONGODB_URI
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
  - name: http
    port: 5001
    targetPort: 5001
  - name: grpc
    port: 5052
    targetPort: 5052
  type: ClusterIP

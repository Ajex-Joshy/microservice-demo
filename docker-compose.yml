services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ajexjoshy
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "50051:50051"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/user-service
      - ORDER_SERVICE_URL=order-service:50052
    depends_on:
      - mongodb
      - order-service

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "50052:50052"
    environment:
      - DATABASE_URL=postgresql://ajexjoshy:password@postgres:5432/postgres?schema=public
    depends_on:
      - postgres

volumes:
  mongodb_data:
  postgres_data:
